apiVersion: apps/v1
kind: Deployment
metadata:
  name: currencyservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: currencyservice
  template:
    metadata:
      annotations:
        vortiq.cloud/inject-nodejs: 'true'
      labels:
        app: currencyservice
        vortiq.cloud/inject-nodejs: 'true'
    spec:
      containers:
      - env:
        - name: PORT
          value: '7000'
        image: ghcr.io/nephelesoftware/hipster-currencyservice:naked
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 7000
          name: grpc
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
      imagePullSecrets:
      - name: hipster-ghcr-pull
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: currencyservice
  namespace: hipster
spec:
  ports:
  - name: grpc
    port: 7000
    targetPort: 7000
  selector:
    app: currencyservice
  type: ClusterIP
