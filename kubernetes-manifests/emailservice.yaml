apiVersion: apps/v1
kind: Deployment
metadata:
  name: emailservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: emailservice
  template:
    metadata:
      annotations:
        vortiq.cloud/inject-python: 'true'
      labels:
        app: emailservice
        vortiq.cloud/inject-python: 'true'
    spec:
      containers:
      - env:
        - name: PORT
          value: '8080'
        - name: DISABLE_PROFILER
          value: '1'
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        image: ghcr.io/nephelesoftware/hipster-emailservice:naked
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 256Mi
      imagePullSecrets:
      - name: hipster-ghcr-pull
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: emailservice
  namespace: hipster
spec:
  ports:
  - name: grpc
    port: 5000
    targetPort: 8080
  selector:
    app: emailservice
  type: ClusterIP
