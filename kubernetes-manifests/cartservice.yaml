apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      annotations:
        vortiq.cloud/dotnet-platform: musl
        vortiq.cloud/inject-dotnet: 'true'
      labels:
        app: cartservice
        vortiq.cloud/inject-dotnet: 'true'
    spec:
      containers:
      - env:
        - name: REDIS_ADDR
          value: redis-cart:6379
        - name: PORT
          value: '7070'
        - name: LISTEN_ADDR
          value: 0.0.0.0
        - name: HIPSTER_SICK
          value: 'false'
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        image: ghcr.io/nephelesoftware/hipster-cartservice:naked
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 7070
        resources:
          limits:
            cpu: 300m
            memory: 128Mi
          requests:
            cpu: 200m
            memory: 64Mi
      imagePullSecrets:
      - name: hipster-ghcr-pull
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: hipster
spec:
  ports:
  - name: grpc
    port: 7070
    targetPort: 7070
  selector:
    app: cartservice
  type: ClusterIP
