apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      annotations:
        vortiq.cloud/inject-java: 'true'
      labels:
        app: adservice
        vortiq.cloud/inject-java: 'true'
    spec:
      containers:
      - env:
        - name: PORT
          value: '9555'
        image: ghcr.io/nephelesoftware/hipster-adservice:naked
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 9555
        resources:
          limits:
            cpu: 300m
            memory: 300Mi
          requests:
            cpu: 200m
            memory: 180Mi
      imagePullSecrets:
      - name: hipster-ghcr-pull
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: hipster
spec:
  ports:
  - name: grpc
    port: 9555
    targetPort: 9555
  selector:
    app: adservice
  type: ClusterIP
