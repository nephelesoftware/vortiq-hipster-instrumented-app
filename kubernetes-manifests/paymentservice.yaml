apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: hipster
spec:
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      annotations:
        vortiq.cloud/inject-nodejs: 'true'
      labels:
        app: paymentservice
        vortiq.cloud/inject-nodejs: 'true'
    spec:
      containers:
      - env:
        - name: PORT
          value: '50051'
        - name: POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        image: ghcr.io/nephelesoftware/hipster-paymentservice:naked
        imagePullPolicy: IfNotPresent
        name: server
        ports:
        - containerPort: 50051
        resources:
          limits:
            cpu: 200m
            memory: 128Mi
          requests:
            cpu: 100m
            memory: 64Mi
      imagePullSecrets:
      - name: hipster-ghcr-pull
      terminationGracePeriodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice
  namespace: hipster
spec:
  ports:
  - name: grpc
    port: 50051
    targetPort: 50051
  selector:
    app: paymentservice
  type: ClusterIP
