---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: anomaly-injector
  namespace: hipster

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: anomaly-injector
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale"]
    verbs: ["get", "list", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "delete"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create", "get"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "create", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: anomaly-injector
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: anomaly-injector
subjects:
  - kind: ServiceAccount
    name: anomaly-injector
    namespace: hipster

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: anomaly-injector
  namespace: hipster
  labels:
    app: anomaly-injector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: anomaly-injector
  template:
    metadata:
      labels:
        app: anomaly-injector
    spec:
      serviceAccountName: anomaly-injector
      hostPID: true
      containers:
        - name: anomaly-injector
          image: docker.io/library/anomaly-injector:naked
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: NAMESPACE
              value: "hipster"
            - name: LOG_LEVEL
              value: "INFO"
          securityContext:
            privileged: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: anomaly-injector
  namespace: hipster
  labels:
    app: anomaly-injector
spec:
  type: NodePort
  selector:
    app: anomaly-injector
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30080
      protocol: TCP
