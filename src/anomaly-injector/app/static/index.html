<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vortiq Anomaly Control Center</title>
  <script src="/static/tailwind.min.js"></script>
  <script defer src="/static/alpine.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }

    @keyframes pulse-badge {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
    .badge-running {
      animation: pulse-badge 1.5s ease-in-out infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 4px;
    }

    @keyframes modal-in {
      from { opacity: 0; transform: scale(0.96); }
      to   { opacity: 1; transform: scale(1); }
    }
    .modal-enter {
      animation: modal-in 0.15s ease-out;
    }
  </style>
</head>

<body class="bg-gray-900 text-gray-100 min-h-screen" x-data="anomalyDashboard()" x-init="init()" x-cloak>

  <!-- ===== Header ===== -->
  <header class="bg-gray-800 border-b border-gray-700 shadow-lg">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-white">
          Vortiq Anomaly Control Center
        </h1>
        <p class="text-sm text-gray-400 mt-0.5">Hipster Shop &mdash; Chaos Engineering Dashboard</p>
      </div>
      <div class="flex items-center gap-6 text-sm">
        <!-- Summary bar -->
        <div class="flex items-center gap-2">
          <span class="font-semibold text-gray-300">Running:</span>
          <span
            class="px-2.5 py-0.5 rounded-full font-bold text-base"
            :class="runningCount > 0 ? 'bg-green-700 text-green-100' : 'bg-gray-700 text-gray-400'"
            x-text="runningCount + ' / ' + anomalies.length"
          ></span>
        </div>
        <!-- Last updated -->
        <div class="text-gray-500">
          Updated: <span class="text-gray-300" x-text="lastUpdated"></span>
        </div>
        <!-- Connectivity indicator -->
        <div class="flex items-center gap-1.5">
          <span
            class="w-2.5 h-2.5 rounded-full inline-block"
            :class="connected ? 'bg-green-400' : 'bg-red-500'"
          ></span>
          <span class="text-gray-400" x-text="connected ? 'Live' : 'Offline'"></span>
        </div>
      </div>
    </div>
  </header>

  <!-- ===== Main Grid ===== -->
  <main class="max-w-7xl mx-auto px-6 py-8">

    <!-- Error banner -->
    <div
      x-show="globalError"
      class="mb-6 bg-red-900 border border-red-700 text-red-200 rounded-lg px-4 py-3 flex items-start gap-3"
    >
      <svg class="w-5 h-5 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm-.75-11.25a.75.75 0 011.5 0v4a.75.75 0 01-1.5 0v-4zm.75 7a1 1 0 110-2 1 1 0 010 2z" clip-rule="evenodd"/>
      </svg>
      <div>
        <p class="font-semibold">API Error</p>
        <p class="text-sm" x-text="globalError"></p>
      </div>
      <button @click="globalError = null" class="ml-auto text-red-400 hover:text-red-200">&times;</button>
    </div>

    <!-- Loading state -->
    <div x-show="loading && anomalies.length === 0" class="text-center py-24 text-gray-500">
      <div class="spinner mx-auto mb-4" style="width:32px;height:32px;border-width:4px;"></div>
      <p class="text-lg">Loading anomalies&hellip;</p>
    </div>

    <!-- Anomaly cards grid -->
    <div
      x-show="anomalies.length > 0"
      class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"
    >
      <template x-for="anomaly in anomalies" :key="anomaly.id">
        <div
          class="bg-gray-800 border rounded-xl p-5 flex flex-col gap-4 transition-all duration-300"
          :class="{
            'border-green-600 shadow-green-900/40 shadow-lg': anomaly.status === 'running',
            'border-red-600': anomaly.status === 'error',
            'border-yellow-600': anomaly.status === 'stopping',
            'border-gray-700': anomaly.status === 'idle'
          }"
        >
          <!-- Card header -->
          <div class="flex items-start justify-between gap-2">
            <div class="flex-1 min-w-0">
              <!-- Scenario number derived from id prefix like "s01_..." -->
              <p class="text-xs text-gray-500 font-mono mb-0.5" x-text="scenarioLabel(anomaly.id)"></p>
              <h2
                class="font-bold text-white text-base leading-tight cursor-pointer hover:text-blue-400 transition-colors duration-150 flex items-center gap-1 group"
                @click="openExplanation(anomaly.id)"
              >
                <span x-text="anomaly.name"></span>
                <svg class="w-3.5 h-3.5 text-gray-500 group-hover:text-blue-400 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                  <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a.75.75 0 000 1.5h.253a.25.25 0 01.244.304l-.459 2.066A1.75 1.75 0 0010.747 15H11a.75.75 0 000-1.5h-.253a.25.25 0 01-.244-.304l.459 2.066A1.75 1.75 0 009.253 9H9z" clip-rule="evenodd"/>
                </svg>
              </h2>
            </div>
            <!-- Status badge -->
            <span
              class="px-2.5 py-1 rounded-full text-xs font-semibold uppercase tracking-wide flex-shrink-0"
              :class="badgeClass(anomaly.status)"
              x-text="anomaly.status"
            ></span>
          </div>

          <!-- Description -->
          <p class="text-sm text-gray-400 leading-relaxed" x-text="anomaly.description"></p>

          <!-- Affected services -->
          <div class="flex flex-wrap gap-1.5">
            <template x-for="svc in anomaly.affected_services" :key="svc">
              <span
                class="bg-gray-700 text-gray-300 text-xs px-2 py-0.5 rounded-md font-mono"
                x-text="svc"
              ></span>
            </template>
          </div>

          <!-- Expected impact -->
          <p class="text-xs text-gray-500 italic" x-text="'Impact: ' + anomaly.expected_impact"></p>

          <!-- Elapsed time (when running) -->
          <div
            x-show="anomaly.status === 'running' && anomaly.started_at"
            class="text-xs text-green-400 font-mono"
          >
            Elapsed: <span x-text="elapsed(anomaly.started_at)"></span>
          </div>

          <!-- Error message -->
          <div
            x-show="anomaly.status === 'error' && anomaly.error_message"
            class="bg-red-900/40 border border-red-700 rounded-lg px-3 py-2 text-xs text-red-300 break-all"
          >
            <span class="font-semibold">Error: </span><span x-text="anomaly.error_message"></span>
          </div>

          <!-- Action buttons -->
          <div class="flex gap-3 mt-auto pt-2">
            <!-- Start -->
            <button
              @click="startAnomaly(anomaly)"
              :disabled="anomaly.status === 'running' || anomaly.status === 'stopping' || loadingStates[anomaly.id]"
              class="flex-1 flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-150
                     bg-green-700 hover:bg-green-600 text-white
                     disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-green-700"
            >
              <span x-show="loadingStates[anomaly.id] === 'starting'" class="spinner"></span>
              <svg x-show="!loadingStates[anomaly.id] || loadingStates[anomaly.id] !== 'starting'" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 010 1.972l-11.54 6.347c-.75.412-1.667-.13-1.667-.986V5.653z"/>
              </svg>
              Start
            </button>

            <!-- Stop -->
            <button
              @click="stopAnomaly(anomaly)"
              :disabled="anomaly.status !== 'running' || loadingStates[anomaly.id]"
              class="flex-1 flex items-center justify-center gap-1.5 px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-150
                     bg-red-700 hover:bg-red-600 text-white
                     disabled:opacity-40 disabled:cursor-not-allowed disabled:hover:bg-red-700"
            >
              <span x-show="loadingStates[anomaly.id] === 'stopping'" class="spinner"></span>
              <svg x-show="!loadingStates[anomaly.id] || loadingStates[anomaly.id] !== 'stopping'" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 7.5A2.25 2.25 0 017.5 5.25h9a2.25 2.25 0 012.25 2.25v9a2.25 2.25 0 01-2.25 2.25h-9a2.25 2.25 0 01-2.25-2.25v-9z"/>
              </svg>
              Stop
            </button>
          </div>
        </div>
      </template>
    </div>
  </main>

  <!-- ===== Footer ===== -->
  <footer class="mt-12 border-t border-gray-800 py-4 text-center text-xs text-gray-600">
    Vortiq Anomaly Injector &mdash; Hipster Shop Chaos Engineering &mdash; v1.0.0
  </footer>

  <script>
    function anomalyDashboard() {
      return {
        anomalies: [],
        loadingStates: {},   // anomaly_id -> 'starting' | 'stopping' | null
        loading: true,
        connected: false,
        globalError: null,
        lastUpdated: '--:--:--',
        _ticker: null,       // setInterval handle for elapsed-time display
        _poller: null,       // setInterval handle for API polling

        // Wizard modal state
        activeExplanation: null,
        explanationStep: 0,

        explanations: {
          s01_productcatalog_latency: {
            steps: [
              {
                title: 'What It Does',
                content: 'Uses tc netem via nsenter to add 800ms ± 200ms delay to outgoing packets on the productcatalogservice container\'s eth0 interface. The delay fires at the Linux kernel network layer, after the application has already closed its OTel span — so the service\'s own telemetry appears healthy while its callers suffer.'
              },
              {
                title: 'Impact Chain',
                content: 'productcatalogservice: OTel spans show ~0ms (span closes before kernel delay fires).\nfrontend: GetProduct and ListProducts calls block 800ms+ waiting for responses → avg latency spikes visibly.\ncheckoutservice: GetProduct calls during order placement → P95 latency climbs.\nrecommendationservice: its outbound calls to productcatalog are delayed, surfacing as latency in frontend recommendation traces.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: apm-svc-latency-warning and apm-svc-latency-critical on frontend and checkoutservice. svc-latency-spike ANOMALY on frontend. ep-latency-spike on product listing and detail endpoints.\n\nSilent: productcatalogservice itself shows normal latency — tc netem fires post-span. Key diagnostic: if productcatalog looks healthy but its callers are slow, suspect injected network delay.'
              }
            ]
          },
          s02_redis_saturation: {
            steps: [
              {
                title: 'What It Does',
                content: 'Launches a Kubernetes Job (redis-flood) that writes 500 keys of 10KB each to redis-cart via redis-cli SET, all with a 300s TTL. Total write: ~5MB injected in a burst, followed by sustained key presence for 5 minutes until TTLs expire.'
              },
              {
                title: 'Impact Chain',
                content: 'redis-cart: memory spikes ~5MB; CPU spikes during the write burst; eviction pressure increases if near memory limit.\ncartservice: all cart operations (AddItem, GetCart, EmptyCart) route through redis-cart → latency rises under Redis pressure.\nfrontend: cart badge, add-to-cart, and view-cart interactions slow down.\ncheckoutservice: GetCart call during PlaceOrder slows or fails.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: Redis entity health rules (memory, CPU). apm-svc-latency-warning on cartservice. svc-latency-spike ANOMALY on cartservice. ep-latency-warning on cart endpoints.\n\nRecovery: automatic after ~5 minutes when flood keys expire (TTL=300s), or immediately on stop (scenario flushes flood_key_* via EVAL).'
              }
            ]
          },
          s03_payment_flapping: {
            steps: [
              {
                title: 'What It Does',
                content: 'An asyncio background loop calls delete_namespaced_pod("paymentservice") every 20 seconds. Kubernetes immediately schedules a replacement (desired replicas stays 1). The container restart counter on the replacement pod increments on each cycle.'
              },
              {
                title: 'Impact Chain',
                content: 'paymentservice: oscillates between Terminating → Pending → Running every ~20s; restart count climbs continuously.\ncheckoutservice: PlaceOrder calls paymentservice during the ~10–15s restart window → connection refused → intermittent error spikes.\nfrontend: checkout attempts fail during the payment downtime window, succeed between kills — a noisy, oscillating error pattern.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires reliably: k8scontainer-restarts-high (cumulative restart counter > 3, never decreases). apm-svc-error-rate-warning/critical on checkoutservice (intermittent spikes).\n\nDoes NOT fire: k8spod-phase-not-running and k8sdeployment-replicas-critical — each flap resolves in ~10–15s, shorter than the for_seconds=60 requirement. The K8s pod/deployment layer is effectively blind to this scenario\'s cycling.'
              }
            ]
          },
          s04_currency_outage: {
            steps: [
              {
                title: 'What It Does',
                content: 'Calls scale_deployment("currencyservice", 0). All running pods are terminated immediately by Kubernetes. No new pods are scheduled until stop() restores the original replica count. This is a hard, sustained outage — not a flap.'
              },
              {
                title: 'Impact Chain',
                content: 'currencyservice: 0 pods, 0 metrics, 0 spans — completely dark.\nfrontend: every page calls currency conversion to render prices → all price displays fail across homepage, product pages, and cart.\ncheckoutservice: cannot calculate order totals → every PlaceOrder call fails hard.\nUnlike s03 (intermittent), this is a sustained total failure affecting every user on every page.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: k8sdeployment-replicas-critical (0/1 available, sustained well beyond 60s). svc-calls-drop ANOMALY on currencyservice. apm-svc-error-rate-critical on frontend and checkoutservice. ep-error-rate-spike across checkout and product endpoints.\n\nThis scenario produces the most complete and reliable event coverage — the sustained outage satisfies every for_seconds threshold that faster scenarios miss.'
              }
            ]
          },
          s05_checkout_cascade: {
            steps: [
              {
                title: 'What It Does',
                content: 'Uses tc netem via nsenter to inject 1200ms ± 300ms network delay on checkoutservice\'s container network namespace. Every outbound call from checkoutservice — to all 6 downstream services — is delayed at the kernel level before leaving the container.'
              },
              {
                title: 'Impact Chain',
                content: 'checkoutservice calls 6 downstream services in sequence: cartservice, currencyservice, productcatalogservice, shippingservice, paymentservice, emailservice.\nEach outbound call incurs 1200ms delay → full PlaceOrder latency approaches 7+ seconds.\nAll 6 downstream services show elevated latency in distributed traces (their server spans block waiting for checkoutservice\'s delayed client requests).\nfrontend: checkout triggers a long hang before eventual success or timeout.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: apm-svc-latency-critical on checkoutservice (avg >> 1000ms). svc-latency-spike ANOMALY on checkoutservice. ep-latency-critical on checkout endpoints. Downstream services (cartservice, shippingservice, etc.) may trigger apm-svc-latency-warning.\n\nDistinct from s01: the delay is on the caller side (checkoutservice outbound), so the cascade fans out to all 6 downstream services simultaneously.'
              }
            ]
          },
          s06_memory_leak: {
            steps: [
              {
                title: 'What It Does',
                content: 'Launches a Kubernetes Job (memory-stressor) using the polinux/stress image. The container allocates 450MB against a 512Mi memory limit. When usage approaches the limit, the Linux OOM killer terminates the container. Kubernetes restarts it — creating a CrashLoopBackOff pattern.'
              },
              {
                title: 'Impact Chain',
                content: 'The stressor is a separate job — it does not run inside any application container.\nThe stressor pod itself cycles: allocates memory → OOMKilled → restarted by Kubernetes.\nThe K8s node hosting the stressor experiences memory pressure, which can affect co-located pods via resource competition.\nAPM-layer impact is indirect and node-dependent — service latency increases only if the stressor shares a node with application pods.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: k8scontainer-restarts-high on the stressor container. k8scontainer-mem-limit-critical as memory approaches 512Mi. k8spod-major-page-faults under heavy memory pressure.\n\nAPM signals are indirect — service latency increases only if node memory pressure causes CPU throttling or swap activity on co-located pods.'
              }
            ]
          },
          s07_cpu_burn: {
            steps: [
              {
                title: 'What It Does',
                content: 'Launches a Kubernetes Job (cpu-stressor) using polinux/stress with 4 worker threads spinning at 100% CPU for 300 seconds. No CPU limit is set on the container, so it can consume as much node CPU as available.'
              },
              {
                title: 'Impact Chain',
                content: 'The node running the stressor has its CPU capacity saturated by 4 busy-looping threads.\nAll pods co-located on the same node compete for CPU time — each gets less than its share.\nServices experience CPU throttling: request handling slows down, response times increase uniformly across all endpoints.\nLatency increases affect all services on the node simultaneously — not a single-service signal.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: K8s node CPU rules. k8scontainer-cpu-limit-high on the stressor. apm-svc-latency-warning on multiple services simultaneously.\n\nKey pattern: svc-latency-spike anomalies fire across several services at the same time with no single service showing errors. Correlated multi-service latency without errors is the fingerprint of a node-level resource issue vs an application bug.'
              }
            ]
          },
          s08_shipping_timeout: {
            steps: [
              {
                title: 'What It Does',
                content: 'Calls scale_deployment("shippingservice", 0). All shippingservice pods terminate. Checkout requests for shipping quotes are sent to a service with no running pods — the connection hangs until the gRPC client timeout fires, rather than being refused immediately.'
              },
              {
                title: 'Impact Chain',
                content: 'shippingservice: gone (same Kubernetes mechanism as s04).\ncheckoutservice: PlaceOrder calls GetShippingQuote → request hangs for the full gRPC timeout duration before returning an error.\ncheckoutservice latency spikes to the timeout value (e.g. 5–10s) before the error is returned.\nfrontend: checkout button appears to hang for several seconds before showing an error.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: k8sdeployment-replicas-critical on shippingservice. apm-svc-latency-critical on checkoutservice (latency = timeout duration). apm-svc-error-rate-critical on checkoutservice after timeouts.\n\nSignature: latency spike appears BEFORE the error rate spike (requests are in-flight and timing out). This temporal ordering distinguishes a timeout storm from a fast connection-refused scenario like s04 or s10.'
              }
            ]
          },
          s09_traffic_burst: {
            steps: [
              {
                title: 'What It Does',
                content: 'Scales the loadgenerator deployment from 1 to 5 replicas and patches its USERS environment variable to 50 per replica — producing approximately 250 concurrent simulated users vs the normal ~10. This is demand-driven load amplification: no infrastructure is broken, the system simply receives ~25x its baseline traffic.'
              },
              {
                title: 'Impact Chain',
                content: 'All storefront services receive 5–25x normal request volume simultaneously.\nConnection pools, thread pools, and in-memory queues fill up — latency percentiles (P95, P99) climb before error rates do.\nServices with tighter capacity budgets (adservice, currencyservice, recommendationservice) saturate first, causing their callers to slow down.\nIf services lack autoscaling, the overload is sustained for the entire duration.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: svc-throughput-anomaly across multiple services (CHANGE_POINT UP — the only scenario where throughput increases). apm-svc-latency-warning/critical as queuing delays accumulate. ep-throughput-anomaly on all major endpoints.\n\nDistinct from all other scenarios: throughput metrics go UP, not down. No K8s-layer events fire — infrastructure is healthy. Correlated throughput increases across many services with no infra change is the flash-sale fingerprint.'
              }
            ]
          },
          s10_network_partition: {
            steps: [
              {
                title: 'What It Does',
                content: 'Scales a configurable target service (default: productcatalogservice) to 0 replicas. Same Kubernetes mechanism as s04, but parameterized — any service in the mesh can be partitioned. Callers receive connection-refused errors immediately rather than slow responses.'
              },
              {
                title: 'Impact Chain',
                content: 'productcatalogservice (default target): gone.\nfrontend: product listing and detail pages fail immediately — errors returned in milliseconds (connection refused), not after a timeout.\nrecommendationservice: calls to productcatalog fail immediately.\ncheckoutservice: GetProduct during PlaceOrder fails immediately.\nFast-failure pattern propagates instantly through the call graph — no hanging requests.'
              },
              {
                title: 'Expected Signals',
                content: 'Fires: k8sdeployment-replicas-critical on target service. svc-calls-drop ANOMALY. apm-svc-error-rate-critical on all callers. ep-error-rate-spike on all endpoints calling the target.\n\nDistinction from s08: errors are immediate (connection refused in <1ms), not delayed. Latency does NOT spike — error rate jumps instantly without a preceding latency increase. No latency preamble before errors = hard connection failure, not a timeout.'
              }
            ]
          }
        },

        // ------------------------------------------------------------------
        init() {
          this.fetchAnomalies();
          this._poller = setInterval(() => this.fetchAnomalies(), 3000);
          // Redraw elapsed counters every second
          this._ticker = setInterval(() => { /* Alpine re-evaluates x-text */ }, 1000);
        },

        // ------------------------------------------------------------------
        async fetchAnomalies() {
          try {
            const res = await fetch(window.location.origin + '/api/anomalies');
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            this.anomalies = await res.json();
            this.connected = true;
            this.lastUpdated = new Date().toLocaleTimeString();
          } catch (err) {
            this.connected = false;
            console.error('Poll error:', err);
          } finally {
            this.loading = false;
          }
        },

        // ------------------------------------------------------------------
        async startAnomaly(anomaly) {
          this.loadingStates = { ...this.loadingStates, [anomaly.id]: 'starting' };
          this.globalError = null;
          try {
            const res = await fetch(window.location.origin + `/api/anomalies/${anomaly.id}/start`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ parameters: anomaly.parameters || {} }),
            });
            const data = await res.json();
            if (!res.ok) {
              this.globalError = data.detail || `Failed to start ${anomaly.name}`;
            } else {
              this.mergeAnomaly(data);
            }
          } catch (err) {
            this.globalError = `Network error: ${err.message}`;
          } finally {
            this.loadingStates = { ...this.loadingStates, [anomaly.id]: null };
          }
        },

        // ------------------------------------------------------------------
        async stopAnomaly(anomaly) {
          this.loadingStates = { ...this.loadingStates, [anomaly.id]: 'stopping' };
          this.globalError = null;
          try {
            const res = await fetch(window.location.origin + `/api/anomalies/${anomaly.id}/stop`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({}),
            });
            const data = await res.json();
            if (!res.ok) {
              this.globalError = data.detail || `Failed to stop ${anomaly.name}`;
            } else {
              this.mergeAnomaly(data);
            }
          } catch (err) {
            this.globalError = `Network error: ${err.message}`;
          } finally {
            this.loadingStates = { ...this.loadingStates, [anomaly.id]: null };
          }
        },

        // ------------------------------------------------------------------
        mergeAnomaly(updated) {
          const idx = this.anomalies.findIndex(a => a.id === updated.id);
          if (idx !== -1) {
            this.anomalies[idx] = updated;
            this.anomalies = [...this.anomalies];  // trigger Alpine reactivity
          }
        },

        // ------------------------------------------------------------------
        get runningCount() {
          return this.anomalies.filter(a => a.status === 'running').length;
        },

        // ------------------------------------------------------------------
        badgeClass(status) {
          return {
            idle:     'bg-gray-700 text-gray-300',
            running:  'bg-green-700 text-green-100 badge-running',
            error:    'bg-red-700 text-red-100',
            stopping: 'bg-yellow-700 text-yellow-100',
          }[status] || 'bg-gray-700 text-gray-300';
        },

        // ------------------------------------------------------------------
        scenarioLabel(id) {
          // "s01_productcatalog_latency" -> "Scenario 01"
          const m = id.match(/^s(\d+)_/);
          return m ? `Scenario ${m[1]}` : id;
        },

        // ------------------------------------------------------------------
        elapsed(startedAt) {
          if (!startedAt) return '';
          const start = new Date(startedAt);
          const now = new Date();
          let diff = Math.floor((now - start) / 1000);
          if (diff < 0) diff = 0;
          const h = Math.floor(diff / 3600);
          const m = Math.floor((diff % 3600) / 60);
          const s = diff % 60;
          const pad = n => String(n).padStart(2, '0');
          return h > 0 ? `${pad(h)}:${pad(m)}:${pad(s)}` : `${pad(m)}:${pad(s)}`;
        },

        // ------------------------------------------------------------------
        openExplanation(id) {
          this.activeExplanation = id;
          this.explanationStep = 0;
        },

        closeExplanation() {
          this.activeExplanation = null;
          this.explanationStep = 0;
        },

        nextStep() {
          if (this.explanationStep < this.activeSteps.length - 1) this.explanationStep++;
          else this.closeExplanation();
        },

        prevStep() {
          if (this.explanationStep > 0) this.explanationStep--;
        },

        get activeSteps() {
          if (!this.activeExplanation) return [];
          return (this.explanations[this.activeExplanation] || {}).steps || [];
        },

        get activeScenarioLabel() {
          if (!this.activeExplanation) return '';
          const m = this.activeExplanation.match(/^s(\d+)_/);
          return m ? `Scenario ${m[1]}` : this.activeExplanation;
        },

        get activeScenarioName() {
          const a = this.anomalies.find(x => x.id === this.activeExplanation);
          return a ? a.name : '';
        },
      };
    }
  </script>

  <!-- ===== Scenario Explanation Wizard ===== -->
  <div
    x-show="activeExplanation !== null"
    x-cloak
    class="fixed inset-0 z-50 flex items-center justify-center p-4"
    style="background: rgba(0,0,0,0.75);"
    @click.self="closeExplanation()"
  >
    <div
      class="modal-enter bg-white border border-gray-200 rounded-2xl w-full max-w-2xl flex flex-col shadow-2xl"
      style="max-height: 90vh;"
      @click.stop
    >
      <!-- Modal header -->
      <div class="flex items-start justify-between px-6 pt-6 pb-4 border-b border-gray-200">
        <div>
          <p class="text-xs text-gray-400 font-mono mb-0.5" x-text="activeScenarioLabel"></p>
          <h3 class="text-xl font-bold text-gray-900" x-text="activeScenarioName"></h3>
        </div>
        <button
          @click="closeExplanation()"
          class="ml-4 text-gray-400 hover:text-gray-700 transition-colors text-2xl leading-none flex-shrink-0"
          aria-label="Close"
        >&times;</button>
      </div>

      <!-- Step content -->
      <div class="px-6 py-6 flex-1 overflow-y-auto">
        <template x-if="activeSteps.length > 0">
          <div>
            <h4
              class="text-sm font-bold text-blue-600 uppercase tracking-wider mb-4"
              x-text="activeSteps[explanationStep].title"
            ></h4>
            <p
              class="text-base text-gray-700 leading-relaxed whitespace-pre-line"
              x-text="activeSteps[explanationStep].content"
            ></p>
          </div>
        </template>
      </div>

      <!-- Footer: step dots + navigation -->
      <div class="px-6 py-4 border-t border-gray-200 flex items-center justify-between">
        <!-- Step dots -->
        <div class="flex items-center gap-2">
          <template x-for="(_, i) in activeSteps" :key="i">
            <span
              class="w-2.5 h-2.5 rounded-full transition-colors duration-150"
              :class="i === explanationStep ? 'bg-gray-900' : 'bg-gray-300'"
            ></span>
          </template>
        </div>

        <!-- Buttons -->
        <div class="flex gap-3">
          <button
            @click="prevStep()"
            :disabled="explanationStep === 0"
            class="px-4 py-2 rounded-lg text-sm font-semibold transition-all duration-150"
            :class="explanationStep === 0
              ? 'bg-gray-100 text-gray-400 cursor-not-allowed opacity-50'
              : 'bg-gray-100 text-gray-700 hover:bg-gray-200 cursor-pointer'"
          >
            &larr; Back
          </button>
          <button
            @click="nextStep()"
            class="px-4 py-2 rounded-lg text-sm font-semibold bg-blue-600 hover:bg-blue-700 text-white transition-all duration-150 cursor-pointer"
            x-text="explanationStep === activeSteps.length - 1 ? 'Done' : 'Next \u2192'"
          ></button>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
